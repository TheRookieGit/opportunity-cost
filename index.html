<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="花了买啥">
<meta name="theme-color" content="#0d1b2a">
<link rel="apple-touch-icon" href="icon.png">
<title>买这个，少吃什么？</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Cormorant+Garamond:ital,wght@0,300;0,500;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1b2a; --card: #13243a; --card2: #0f1e30;
    --gold: #c9a84c; --gold-l: #e8d08a; --cream: #f0ead8;
    --dim: #8a9bb0; --red: #e05c4b; --green: #4caf82;
    --border: rgba(201,168,76,0.18);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--cream); font-family: 'Noto Sans SC', sans-serif; min-height: 100vh; }

  .page {
    max-width: 680px; margin: 0 auto;
    padding: max(40px, env(safe-area-inset-top)) max(24px, env(safe-area-inset-right)) max(80px, env(safe-area-inset-bottom)) max(24px, env(safe-area-inset-left));
  }

  h1 { font-family: 'Cormorant Garamond', serif; font-size: 32px; font-weight: 300; text-align: center; color: var(--cream); margin-bottom: 6px; letter-spacing: 0.03em; }
  h1 em { font-style: italic; color: var(--gold-l); }
  .sub { text-align: center; font-size: 12px; color: var(--dim); font-family: 'DM Mono', monospace; letter-spacing: 0.12em; margin-bottom: 36px; }

  /* Input */
  .input-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 24px 24px 20px; margin-bottom: 16px; }
  .input-row { display: flex; gap: 12px; align-items: flex-end; }
  .field { display: flex; flex-direction: column; gap: 7px; flex: 1; }
  .field label { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--gold); }
  .field input { background: var(--card2); border: 1px solid rgba(201,168,76,0.22); border-radius: 6px; padding: 12px 14px; color: var(--cream); font-family: 'Noto Sans SC', sans-serif; font-size: 15px; outline: none; transition: border-color 0.2s; width: 100%; }
  .field input:focus { border-color: var(--gold); }
  .price-wrap { position: relative; }
  .price-wrap::before { content: '$'; position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: var(--gold); font-family: 'DM Mono', monospace; font-size: 13px; pointer-events: none; }
  .price-wrap input { padding-left: 26px; font-size: 22px; font-weight: 500; color: var(--gold-l); }
  .add-btn { padding: 13px 22px; background: var(--gold); border: none; border-radius: 6px; color: #0d1b2a; font-family: 'Noto Sans SC', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
  .add-btn:active { opacity: 0.75; }

  /* History */
  .history { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 16px 18px; margin-bottom: 24px; }
  .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .history-title { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); }
  .reset-btn { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--red); background: none; border: 1px solid rgba(224,92,75,0.3); border-radius: 4px; padding: 4px 10px; cursor: pointer; letter-spacing: 0.05em; }
  .reset-btn:active { opacity: 0.7; }

  .purchase-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
  .purchase-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 10px; background: var(--card2); border-radius: 6px; }
  .purchase-info { display: flex; gap: 10px; align-items: baseline; }
  .purchase-amount { font-family: 'DM Mono', monospace; font-size: 15px; font-weight: 500; color: var(--gold-l); }
  .purchase-date { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--dim); }
  .delete-btn { background: none; border: none; color: var(--dim); font-size: 20px; cursor: pointer; padding: 0 2px; line-height: 1; }
  .delete-btn:active { color: var(--red); }

  .total-row { display: flex; justify-content: space-between; align-items: center; padding-top: 10px; border-top: 1px solid var(--border); }
  .total-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--dim); }
  .total-amount { font-family: 'DM Mono', monospace; font-size: 18px; font-weight: 500; color: var(--red); }

  /* Section */
  .sec { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--gold); margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
  .sec::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* Cards */
  .tradeoff-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 20px 20px 16px; margin-bottom: 16px; }
  .tradeoff-label { font-size: 13px; color: var(--dim); margin-bottom: 14px; line-height: 1.6; }
  .emoji-row { display: flex; flex-wrap: wrap; gap: 5px; min-height: 34px; align-items: center; }
  .emoji-bubble { width: 34px; height: 34px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 19px; position: relative; }
  .emoji-bubble.kept { background: rgba(76,175,130,0.15); border: 1px solid rgba(76,175,130,0.3); }
  .emoji-bubble.lost { background: rgba(224,92,75,0.1); border: 1px solid rgba(224,92,75,0.3); opacity: 0.4; }
  .emoji-bubble.lost::after { content: '✕'; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; color: var(--red); font-weight: 700; background: rgba(13,27,42,0.5); border-radius: 7px; }
  .tradeoff-foot { margin-top: 10px; font-size: 11px; color: var(--dim); font-family: 'DM Mono', monospace; }
  .tradeoff-foot span { color: var(--cream); }

  /* Empty */
  .empty { text-align: center; padding: 50px 0 30px; }
  .empty-icon { font-size: 40px; opacity: 0.25; margin-bottom: 14px; }
  .empty-text { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 18px; color: var(--dim); }

  @media (max-width: 500px) { h1 { font-size: 26px; } }
</style>
</head>
<body>
<div class="page">

  <h1>买了这个，<em>就少吃这些</em></h1>
  <div class="sub">月预算 $5,500 · 可支配 $3,677 · 基于真实消费数据</div>

  <div class="input-card">
    <div class="input-row">
      <div class="field">
        <label>这件东西多少钱</label>
        <div class="price-wrap">
          <input id="price" type="number" placeholder="0" min="0" step="1" inputmode="numeric">
        </div>
      </div>
      <button class="add-btn" id="addBtn">加入</button>
    </div>
  </div>

  <div class="history" id="historySection" style="display:none">
    <div class="history-header">
      <span class="history-title">本月已买</span>
      <button class="reset-btn" id="resetBtn">清空本月</button>
    </div>
    <div class="purchase-list" id="purchaseList"></div>
    <div class="total-row">
      <span class="total-label">累计花掉</span>
      <span class="total-amount" id="totalAmount">$0</span>
    </div>
  </div>

  <div class="empty" id="empty">
    <div class="empty-icon">🛒</div>
    <div class="empty-text">输入价格，看看少吃什么</div>
  </div>

  <div id="results" style="display:none">
    <div class="sec">加起来，这个月就少了…</div>
    <div id="cards"></div>
  </div>

</div>
<script>
  const ITEMS = [
    { emoji: '🛵', name: '外卖 / 快餐',     price: 16.71, unit: '单', monthly: 22 },
    { emoji: '🍜', name: '餐厅（自己的份）', price: 22.70, unit: '顿', monthly: 12 },
    { emoji: '☕', name: '奶茶',             price: 10.26, unit: '杯', monthly: 10 },
    { emoji: '🛒', name: '买菜 / 超市',       price: 56.10, unit: '次', monthly: 8  },
    { emoji: '🎭', name: '娱乐活动',         price: 74.15, unit: '次', monthly: 2  },
  ];

  const DISCRETIONARY = 3677;
  const KEY = 'purchases_v1';

  function thisMonth() {
    const d = new Date();
    return `${d.getFullYear()}-${d.getMonth() + 1}`;
  }

  function load() {
    try {
      const raw = localStorage.getItem(KEY);
      if (!raw) return [];
      const data = JSON.parse(raw);
      if (data.month !== thisMonth()) return [];
      return data.items || [];
    } catch { return []; }
  }

  function save(items) {
    localStorage.setItem(KEY, JSON.stringify({ month: thisMonth(), items }));
  }

  function render() {
    const purchases = load();
    const total = purchases.reduce((s, p) => s + p.amount, 0);

    const historySection = document.getElementById('historySection');
    const purchaseList   = document.getElementById('purchaseList');
    const totalAmountEl  = document.getElementById('totalAmount');
    const resultsEl      = document.getElementById('results');
    const emptyEl        = document.getElementById('empty');
    const cardsEl        = document.getElementById('cards');

    if (purchases.length === 0) {
      historySection.style.display = 'none';
      resultsEl.style.display = 'none';
      emptyEl.style.display = 'block';
      return;
    }

    historySection.style.display = 'block';
    emptyEl.style.display = 'none';
    resultsEl.style.display = 'block';

    // Purchase list
    purchaseList.innerHTML = '';
    purchases.forEach((p, i) => {
      const row = document.createElement('div');
      row.className = 'purchase-item';
      row.innerHTML = `
        <div class="purchase-info">
          <span class="purchase-amount">$${p.amount.toFixed(0)}</span>
          <span class="purchase-date">${p.date}</span>
        </div>
        <button class="delete-btn" data-i="${i}">&times;</button>`;
      purchaseList.appendChild(row);
    });

    totalAmountEl.textContent = `$${total.toFixed(0)}`;

    purchaseList.querySelectorAll('.delete-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const items = load();
        items.splice(parseInt(btn.dataset.i), 1);
        save(items);
        render();
      });
    });

    // Impact cards
    cardsEl.innerHTML = '';
    ITEMS.forEach(item => {
      const lostCount    = total / item.price;
      const lostFraction = total / (item.price * item.monthly);
      const lostBubbles  = Math.min(Math.round(lostFraction * item.monthly), item.monthly);
      const keptBubbles  = item.monthly - lostBubbles;
      const lostDisplay  = lostCount >= 10 ? Math.round(lostCount) : lostCount.toFixed(1);

      let bubbles = '';
      for (let i = 0; i < keptBubbles; i++) bubbles += `<div class="emoji-bubble kept">${item.emoji}</div>`;
      for (let i = 0; i < lostBubbles; i++) bubbles += `<div class="emoji-bubble lost">${item.emoji}</div>`;

      const card = document.createElement('div');
      card.className = 'tradeoff-card';
      card.innerHTML = `
        <div class="tradeoff-label">
          花了 <strong style="color:var(--gold-l)">$${total.toFixed(0)}</strong>，
          这个月的 <strong>${item.name}</strong> 少 ${lostDisplay} ${item.unit}
        </div>
        <div class="emoji-row">${bubbles}</div>
        <div class="tradeoff-foot">
          本月预计 <span>${item.monthly} ${item.unit}</span> ${item.name}，
          其中 <span style="color:var(--red)">${lostBubbles} ${item.unit}</span> 的预算被用掉了
        </div>`;
      cardsEl.appendChild(card);
    });
  }

  document.getElementById('addBtn').addEventListener('click', () => {
    const val = parseFloat(document.getElementById('price').value);
    if (!val || val <= 0) return;
    const d = new Date();
    const items = load();
    items.push({ amount: val, date: `${d.getMonth()+1}/${d.getDate()}` });
    save(items);
    document.getElementById('price').value = '';
    render();
  });

  document.getElementById('price').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('addBtn').click();
  });

  document.getElementById('resetBtn').addEventListener('click', () => {
    if (confirm('清空本月所有记录？')) { save([]); render(); }
  });

  render();
</script>
</body>
</html>
